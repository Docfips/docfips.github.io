<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slattery SecurityTitle</title>
  <style>
    /* Dracula Theme Colors */
    body {
      background-color: #282a36;
      color: #f8f8f2;
      font-family: sans-serif;
      margin: 0;
    }

    a {
      color: #8be9fd;
      text-decoration: none;
    }

    a:hover {
      color: #bd93f9;
    }

    h1, h2, h3 {
      color: #f1fa8c;
      margin-bottom: 1.5rem;
      text-align: center; /* Center headings */
    }

    p {
      line-height: 1.5;
      margin-bottom: 1rem;
      /* Center paragraphs and other content */
      text-align: center;
    }

    ul, ol {
      list-style: none;
      padding: 0;
    }

    li {
      margin-bottom: 0.5rem;
    }

    /* Additional Styling (Optional) */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center; /* Keep header text centered */
      margin-bottom: 2rem;
    }

    footer {
      text-align: center;
      padding-top: 2rem;
      border-top: 1px solid #44475a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Slattery Security</h1>
  </header>

  <main class="container">
    <p>Thank you for coming to my page! Please excuse my mess!.</p>
  </main>

  <footer>
    &copy; 2024 Slattery Security
  </footer>
</body>
</html>
